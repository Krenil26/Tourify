services:
  - type: web
    name: Tourifyy-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # Set this in the Render Dashboard
      - key: FRONTEND_URL
        sync: false # Set this to your deployed frontend URL
      - key: JWT_SECRET
        sync: false # Set this in the Render Dashboard
